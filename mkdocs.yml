  - search:
      separator: '[\s\-\.\!\?\,\;\:\（）【】「」、。，！？；：\(\)]+|(?<=[一-鿿])(?=[一-鿿])'
      lang:
        - zh
        - en
  - git-revision-date:
  - minify:
      minify_html: true
  - open-in-new-tab:

extra_css:
  - stylesheets/extra.css
  - stylesheets/likes.css

extra_javascript:
