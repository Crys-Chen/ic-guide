site_name: ECE自学指南
site_url: https://crys-chen.github.io/Fudan-ME/
site_author: Crys-Chen
site_description: >-
  ECE自学指南

repo_name: Fudan-ME
repo_url: https://github.com/Crys-Chen/Fudan-ME

copyright: Copyright &copy; 2021-present <a href="https://github.com/PKUFlyingPig" target="_blank" rel="noopener noreferrer">PKUFlyingPig</a>

theme:
  name: material
  language: zh
  static_templates:
    - 404.html
  favicon: images/favicon.ico
  apple-touch-icon-precomposed: images/mobile_icon.png
  include_search_page: false
  search_index_only: true

  features:
    - header.autohide
    - navigation.tracking
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.annotate
    - content.tooltips
    - toc.follow

  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 切换为夜间模式
    - scheme: slate
      primary: custom
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: 切换为日间模式

  font:
    text: Noto Sans SC
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

  custom_dir: overrides

hooks:
  - hooks.py

markdown_extensions:
  - attr_list
  - md_in_html
  - footnotes
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      # 显式只用 en stemmer——避免 Material 对 zh 自动加载 TinySegmenter
      # (一个日语分词器,对中文 query 切分错误)。中文匹配完全靠 separator
      # + scripts/inject_ngrams.py 注入的 n-gram tokens。
      lang:
        - en
      # CJK-to-CJK 不切分(原文整段中文为一个长 token),只在中/英切换、
      # 标点、零宽空格(​)、HTML 标签字符(< > = " ')处切分。中文短语
      # 搜索由 inject_ngrams.py 注入的 n-gram token 承担:每页所有 2~4
      # 字 n-gram 包在 <span style="display:none"> 中以 ZWSP 分隔追加进
      # doc.text。客户端 excerpt 用 innerHTML 渲染,span 整体不可见。
      separator: '(?<=[一-鿿])(?=[a-zA-Z0-9])|(?<=[a-zA-Z0-9])(?=[一-鿿])|[\s​\-\!\.\,\;\:（）【】「」、。，！？；：\(\)<>="'']+'
  - git-revision-date:
  - minify:
      minify_html: false
      minify_css: true
      minify_js: true
  - open-in-new-tab:

extra_css:
  - stylesheets/extra.css
  - stylesheets/likes.css

extra_javascript:
  - javascripts/likes.js
  - javascripts/prof-collapse.js
  - javascripts/orbit-galaxy.js
  - javascripts/hero-scroll.js
  - https://cdn.jsdelivr.net/npm/markmap-autoloader@latest

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pkuflyingpig/cs-self-learning/
  analytics:
    provider: google
    property: G-KJB4RXSKZG

