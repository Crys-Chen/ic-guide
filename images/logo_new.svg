<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 190">
  <!-- Chip body + integrated location pin; no shadow -->
  <path d="M 65,34 Q 55,34 55,44 L 55,109 Q 55,119 61,127 L 100,162 L 139,127 Q 145,119 145,109 L 145,44 Q 145,34 135,34 Z" fill="#032168"/>

  <!-- Pads: lighter blue, same hue family -->
  <g fill="#1A5FC7">
    <!-- Top -->
    <rect x="78"  y="20" width="10" height="14" rx="2"/>
    <rect x="112" y="20" width="10" height="14" rx="2"/>
    <!-- Left -->
    <rect x="41" y="55" width="14" height="10" rx="2"/>
    <rect x="41" y="88" width="14" height="10" rx="2"/>
    <!-- Right -->
    <rect x="145" y="55" width="14" height="10" rx="2"/>
    <rect x="145" y="88" width="14" height="10" rx="2"/>
  </g>

  <!-- Inner die border: engraved white line -->
  <rect x="64" y="43" width="72" height="57" fill="none" stroke="#ffffff" stroke-width="1.5" rx="5" stroke-opacity="0.35"/>

  <!-- Pin 1 indicator -->
  <circle cx="72" cy="51" r="3.5" fill="#ffffff" fill-opacity="0.6"/>

  <!-- IC text -->
  <text x="100" y="84" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="38" fill="#ffffff" text-anchor="middle" letter-spacing="3">IC</text>
</svg>
