<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="400" height="440">
  <defs>
    <style>
      .bg-blue { fill: #0D3692; }
      .bg-teal { fill: #C9A84C; }
    </style>
  </defs>
  <!-- Shadow: rx:ry=58:21≈2.76:1, e≈0.93 — contact shadow anchoring the pin -->
  <ellipse cx="100" cy="180" rx="88" ry="21" fill="#C9A84C" fill-opacity="0.2" stroke="#C9A84C" stroke-width="2.5"/>
  <!-- Unified die+triangle: top corners rounded (r=10), bottom corners curve smoothly into triangle -->
  <path d="M 70,40 Q 60,40 60,50 L 60,110 Q 60,120 66,128 L 100,180 L 134,128 Q 140,120 140,110 L 140,50 Q 140,40 130,40 Z" class="bg-blue"/>
  <!-- 8 pads: width=10px, extension=14px, at 1/4 and 3/4 of each edge -->
  <g class="bg-teal">
    <rect x="75" y="26" width="10" height="14" rx="2"/>
    <rect x="115" y="26" width="10" height="14" rx="2"/>
    <rect x="75" y="120" width="10" height="14" rx="2"/>
    <rect x="115" y="120" width="10" height="14" rx="2"/>
    <rect x="46" y="55" width="14" height="10" rx="2"/>
    <rect x="46" y="95" width="14" height="10" rx="2"/>
    <rect x="140" y="55" width="14" height="10" rx="2"/>
    <rect x="140" y="95" width="14" height="10" rx="2"/>
  </g>
  <!-- Inner border -->
  <rect x="67" y="47" width="66" height="66" fill="#ffffff" rx="7"/>
  <!-- Pin 1 dot -->
  <circle cx="74" cy="54" r="4.5" class="bg-blue"/>
  <!-- IC text -->
  <text x="102" y="96" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="41" fill="#0D3692" text-anchor="middle" letter-spacing="2">IC</text>
</svg>
