<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- D: E字版图 — letter E as PCB traces inside a dark rounded-square badge -->
  <rect x="0" y="0" width="80" height="80" rx="14" fill="#032168"/>
  <!-- E spine (vertical) -->
  <rect x="14" y="14" width="10" height="52" fill="white"/>
  <!-- Top arm (full width) with bond pad at end -->
  <rect x="24" y="14" width="34" height="10" fill="white"/>
  <rect x="57" y="11" width="9" height="7" rx="1.5" fill="#1a48a8"/>
  <!-- Middle arm (shorter) with bond pad -->
  <rect x="24" y="35" width="27" height="10" fill="white"/>
  <rect x="50" y="32" width="9" height="7" rx="1.5" fill="#1a48a8"/>
  <!-- Bottom arm (full width) with bond pad -->
  <rect x="24" y="56" width="34" height="10" fill="white"/>
  <rect x="57" y="53" width="9" height="7" rx="1.5" fill="#1a48a8"/>
  <!-- Pads on spine left edge -->
  <rect x="11" y="22" width="4" height="6" rx="1" fill="#1a48a8"/>
  <rect x="11" y="52" width="4" height="6" rx="1" fill="#1a48a8"/>
</svg>
