<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- C: 射线知识图 — central chip, 8 branches = research directions -->
  <!-- diagonal rays (lighter, thinner) -->
  <line x1="50" y1="50" x2="74" y2="26" stroke="#1a48a8" stroke-width="1.8"/>
  <line x1="50" y1="50" x2="74" y2="74" stroke="#1a48a8" stroke-width="1.8"/>
  <line x1="50" y1="50" x2="26" y2="74" stroke="#1a48a8" stroke-width="1.8"/>
  <line x1="50" y1="50" x2="26" y2="26" stroke="#1a48a8" stroke-width="1.8"/>
  <!-- cardinal rays (bolder) -->
  <line x1="50" y1="50" x2="50" y2="12" stroke="#032168" stroke-width="2.5"/>
  <line x1="50" y1="50" x2="88" y2="50" stroke="#032168" stroke-width="2.5"/>
  <line x1="50" y1="50" x2="50" y2="88" stroke="#032168" stroke-width="2.5"/>
  <line x1="50" y1="50" x2="12" y2="50" stroke="#032168" stroke-width="2.5"/>
  <!-- cardinal endpoint nodes -->
  <circle cx="50" cy="10" r="5" fill="#032168"/>
  <circle cx="90" cy="50" r="5" fill="#032168"/>
  <circle cx="50" cy="90" r="5" fill="#032168"/>
  <circle cx="10" cy="50" r="5" fill="#032168"/>
  <!-- diagonal endpoint nodes -->
  <circle cx="76" cy="24" r="3.5" fill="#1a48a8"/>
  <circle cx="76" cy="76" r="3.5" fill="#1a48a8"/>
  <circle cx="24" cy="76" r="3.5" fill="#1a48a8"/>
  <circle cx="24" cy="24" r="3.5" fill="#1a48a8"/>
  <!-- center chip -->
  <circle cx="50" cy="50" r="11" fill="#032168"/>
  <rect x="44" y="44" width="12" height="12" fill="white" opacity="0.9"/>
  <line x1="44" y1="50" x2="56" y2="50" stroke="#032168" stroke-width="1.5"/>
  <line x1="50" y1="44" x2="50" y2="56" stroke="#032168" stroke-width="1.5"/>
</svg>
